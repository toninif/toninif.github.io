<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3d3229"/>
    </marker>
    <marker id="arrow-dot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#996b2f"/>
    </marker>
  </defs>

  <!-- X -->
  <rect x="30" y="100" width="60" height="50" rx="4" fill="#e8d5a8" stroke="#3d3229" stroke-width="1.5"/>
  <text x="60" y="132" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#3d3229">X</text>

  <!-- Flecha gruesa X → META -->
  <line x1="95" y1="125" x2="575" y2="125" stroke="#c9a96e" stroke-width="8" marker-end="url(#arrow)"/>

  <!-- Arco PLAN -->
  <path d="M 120,100 Q 350,20 580,100" fill="none" stroke="#3d3229" stroke-width="1.2"/>
  <rect x="310" y="25" width="80" height="35" rx="4" fill="#e8d5a8" stroke="#3d3229" stroke-width="1.5"/>
  <text x="350" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="bold" fill="#3d3229">PLAN</text>

  <!-- META -->
  <rect x="595" y="100" width="90" height="50" rx="4" fill="#e8d5a8" stroke="#3d3229" stroke-width="1.5"/>
  <text x="640" y="132" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#3d3229">META</text>

  <!-- META → RESULTADO -->
  <line x1="640" y1="155" x2="640" y2="195" stroke="#3d3229" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- RESULTADO -->
  <rect x="575" y="200" width="140" height="40" rx="4" fill="#e8d5a8" stroke="#3d3229" stroke-width="1.5"/>
  <text x="645" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#3d3229">RESULTADO</text>

  <!-- RESULTADO → ATRIBUCIÓN -->
  <line x1="575" y1="235" x2="520" y2="270" stroke="#3d3229" stroke-width="1.2" stroke-dasharray="6,4" marker-end="url(#arrow-dot)"/>

  <!-- ATRIBUCIÓN -->
  <rect x="370" y="270" width="150" height="40" rx="4" fill="#e8d5a8" stroke="#3d3229" stroke-width="1.5"/>
  <text x="445" y="295" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#3d3229">ATRIBUCIÓN</text>

  <!-- ATRIBUCIÓN → EXPECTATIVAS -->
  <line x1="365" y1="290" x2="195" y2="290" stroke="#996b2f" stroke-width="1.2" stroke-dasharray="6,4" marker-end="url(#arrow-dot)"/>

  <!-- EXPECTATIVAS -->
  <rect x="30" y="270" width="160" height="40" rx="4" fill="#e8d5a8" stroke="#3d3229" stroke-width="1.5"/>
  <text x="110" y="295" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#3d3229">EXPECTATIVAS</text>

  <!-- EXPECTATIVAS → X -->
  <line x1="60" y1="265" x2="60" y2="157" stroke="#996b2f" stroke-width="1.2" stroke-dasharray="6,4" marker-end="url(#arrow-dot)"/>
</svg>
